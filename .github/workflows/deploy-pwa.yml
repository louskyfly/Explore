name: Deploy PWA to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['pwa/**', 'web/**']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build PhotoMap
        run: |
          cd pwa
          npm install
          npm run build
      - name: Build Explore
        run: |
          cd web
          npm install
          npm run build
      - name: Merge dist folders
        run: |
          mkdir -p output/explore
          cp -r pwa/dist/* output/
          cp -r web/dist/* output/explore/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
